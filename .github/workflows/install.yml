name: Install Dependencies

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        
    - name: Install dependencies
      run: npm install
      
    - name: Verify Installation
      run: ls node_modules/@distube | grep youtubei.js
