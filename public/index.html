<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/x-icon" href="https://www.google.com/s2/favicons?domain=https://youtube.com&sz=256">
  <meta charset="UTF-8">
  <title>YouTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0f0f0f;
      --bg-header: #0f0f0f;
      --bg-sidebar: #0f0f0f;
      --bg-card: #181818;
      --bg-chip: #272727;
      --bg-chip-active: #f1f1f1;
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --border-subtle: #303030;
      --accent: #3ea6ff;
      --tooltip-bg: #282828;
      --brand-red: #ff0000;
    }
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: var(--bg-main);
      color: var(--text-primary);
      overflow-x: hidden;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 56px;
      background-color: var(--bg-header);
    }
    .header-left, .header-center, .header-right {
      display: flex;
      align-items: center;
    }
    .header-left { gap: 16px; }
    .header-center { flex: 0 1 640px; justify-content: center; gap: 8px; }
    .header-right { gap: 8px; }
    .brand {
      display: flex;
      align-items: center;
      cursor: pointer;
      text-decoration: none;
    }
    .brand-svg {
      height: 20px;
      width: auto;
    }
    .search-wrapper {
      display: flex;
      align-items: stretch;
      flex: 1;
      max-width: 600px;
      position: relative;
    }
    .search-input {
      flex: 1;
      background-color: #121212;
      border: 1px solid #303030;
      border-right: none;
      border-radius: 999px 0 0 999px;
      padding: 8px 16px;
      color: var(--text-primary);
      font-size: 16px;
      position: relative;
      z-index: 10;
    }
    .search-input:focus {
      outline: none;
      border-color: #3ea6ff;
    }
    .search-btn {
      border-radius: 0 999px 999px 0;
      background-color: #222222;
      border: 1px solid #303030;
      border-left: none;
      width: 64px;
      cursor: pointer;
      color: var(--text-primary);
    }
    .search-btn:hover { background-color: #333; }
    .autocomplete {
      position: absolute;
      top: 40px;
      left: 0;
      right: 64px;
      background-color: #212121;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      max-height: 360px;
      overflow-y: auto;
      display: none;
      padding: 4px 0;
      z-index: 20;
    }
    .autocomplete-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .autocomplete-item:hover, .autocomplete-item.active { background-color: #333333; }
    .icon-btn, .mic-btn {
      border: none;
      background: transparent;
      color: var(--text-primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .icon-btn:hover, .mic-btn:hover { background-color: #272727; }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #555;
      cursor: pointer;
    }
    .main {
      display: flex;
      min-height: calc(100vh - 56px);
    }
    .sidebar {
      position: sticky;
      top: 56px;
      align-self: flex-start;
      height: calc(100vh - 56px);
      background-color: var(--bg-sidebar);
      padding-top: 12px;
      padding-bottom: 12px;
      overflow-y: auto;
      border-right: 1px solid var(--border-subtle);
      transition: width 0.2s ease, transform 0.2s ease;
    }
    .sidebar-section {
      display: flex;
      flex-direction: column;
      padding: 0 12px;
    }
    .sidebar-divider {
      border: none;
      border-top: 1px solid var(--border-subtle);
      margin: 12px 0;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 8px 12px;
      border-radius: 10px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      position: relative;
    }
    .sidebar-item:hover { background-color: #272727; }
    .sidebar-item.active { background-color: #272727; font-weight: 500; }
    .sidebar-icon { font-size: 22px; }
    body.sidebar-full .sidebar { width: 240px; }
    body.sidebar-mini .sidebar { width: 72px; }
    body.sidebar-mini .sidebar-label { display: none; }
    body.sidebar-mini .sidebar-item { padding: 8px 0; justify-content: center; gap: 0; }
    body.sidebar-mini .sidebar-icon { margin: 0; }
    body.sidebar-mini .sidebar-item::after {
      content: attr(data-tooltip);
      position: fixed;
      left: 72px;
      background-color: var(--tooltip-bg);
      color: var(--text-primary);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-4px);
      transition: opacity 0.15s ease, transform 0.15s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      z-index: 200;
    }
    body.sidebar-mini .sidebar-item:hover::after {
      opacity: 1;
      transform: translateX(0);
    }
    .content {
      flex: 1;
      padding: 24px 24px 40px;
      width: 100%;
    }
    .chips-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .chips-row::-webkit-scrollbar { display: none; }
    .chip {
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 14px;
      font-weight: 500;
      background-color: var(--bg-chip);
      color: var(--text-primary);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .chip:hover { background-color: #3f3f3f; }
    .chip.active {
      background-color: var(--bg-chip-active);
      color: #0f0f0f;
    }
    .section-header {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      display: none;
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px 16px;
    }
    .video-card { cursor: pointer; }
    .thumbnail {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #333;
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      position: relative;
    }
    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .video-card:hover .thumbnail img { transform: scale(1.05); }
    .duration-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 12px;
      padding: 2px 4px;
      border-radius: 4px;
      font-weight: 500;
    }
    .video-info { display: flex; gap: 12px; }
    .video-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }
    .video-meta { display: flex; flex-direction: column; gap: 2px; }
    .video-title {
      font-size: 16px;
      font-weight: 500;
      margin: 0;
      line-height: 1.2rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .video-channel, .video-stats { font-size: 14px; color: var(--text-secondary); margin: 0; }
    .shorts-grid {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 20px;
      scrollbar-width: none;
    }
    .shorts-grid::-webkit-scrollbar { display: none; }
    .shorts-card {
      min-width: 200px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .shorts-card .thumbnail {
      margin-bottom: 0;
      aspect-ratio: 9/16;
      border-radius: 16px;
    }
    .shorts-card .video-title {
      font-size: 14px;
      -webkit-line-clamp: 2;
    }
    .watch-layout {
      display: none;
      gap: 24px;
      max-width: 100%;
    }
    .watch-layout.active { display: grid; grid-template-columns: minmax(0, 2.5fr) minmax(0, 1fr); gap: 24px; }
    .watch-player { width: 100%; }
    .watch-player iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: none;
      border-radius: 12px;
      background: #000;
    }
    .watch-title { font-size: 20px; margin: 12px 0 8px; font-weight: 600; }
    .watch-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 14px;
      color: var(--text-secondary);
      border-bottom: 1px solid #303030;
      padding-bottom: 12px;
      margin-bottom: 12px;
    }
    .watch-channel { display: flex; align-items: center; gap: 12px; }
    .watch-channel-avatar { width: 40px; height: 40px; border-radius: 50%; background: #333; }
    .watch-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .pill-btn {
      border-radius: 999px;
      border: none;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      background: #272727;
      color: var(--text-primary);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .pill-btn:hover { background: #3a3a3a; }
    .pill-btn.liked { background: #3ea6ff; color: #0f0f0f; }
    .embed-toggle {
      display: inline-flex;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #3a3a3a;
    }
    .embed-toggle button {
      border: none;
      background: transparent;
      color: var(--text-secondary);
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .embed-toggle button.active { background: #ffffff; color: #000000; }
    .watch-description {
      margin-top: 12px;
      padding: 12px;
      background: #202020;
      border-radius: 12px;
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.4;
    }
    .related-list { display: flex; flex-direction: column; gap: 8px; }
    .related-item { display: flex; gap: 8px; cursor: pointer; }
    .related-thumb {
      width: 168px;
      height: 94px;
      border-radius: 8px;
      overflow: hidden;
      background: #333;
      flex-shrink: 0;
      position: relative;
    }
    .related-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .related-info { display: flex; flex-direction: column; gap: 2px; font-size: 14px; }
    .related-title { color: var(--text-primary); font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
    .related-channel, .related-stats { color: var(--text-secondary); font-size: 12px; }
    .home-section { display: block; }
    .home-section.hidden { display: none; }
    .watch-layout.hidden { display: none; }
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-secondary);
    }
    .empty-state span { font-size: 48px; display: block; margin-bottom: 16px; opacity: 0.5; }
    .loader {
      border: 3px solid #333;
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 60px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 24px;
      background-color: #fff;
      color: #0f0f0f;
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 14px;
      z-index: 2000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .backdrop {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
      opacity: 0; pointer-events: none; transition: opacity 0.2s ease; z-index: 90;
    }
    body.mobile-sidebar-open .backdrop { opacity: 1; pointer-events: auto; }
    @media (max-width: 1024px) {
      .watch-layout.active { grid-template-columns: 1fr; }
      .related-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; margin-top: 24px; }
      .related-item { flex-direction: column; }
      .related-thumb { width: 100%; aspect-ratio: 16/9; height: auto; }
    }
    @media (max-width: 960px) {
      .main { padding-top: 0; }
      .sidebar {
        position: fixed; top: 56px; left: 0; height: calc(100vh - 56px);
        transform: translateX(-100%); width: 240px; z-index: 100;
      }
      body.mobile-sidebar-open .sidebar { transform: translateX(0); }
      body.sidebar-full .sidebar, body.sidebar-mini .sidebar { width: 240px; }
      .content { padding: 16px; }
      .header-center { flex: 1; margin: 0 8px; }
      .search-wrapper { max-width: none; }
      .autocomplete { right: 0; }
    }
    @media (max-width: 600px) {
      .header-right { gap: 4px; }
      .video-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="sidebar-full">
  <div class="backdrop" id="backdrop"></div>
  
  <header class="header">
    <div class="header-left">
      <div class="brand" id="homeLogo">
        <svg class="brand-svg" viewBox="0 0 90 20" preserveAspectRatio="xMidYMid meet" focusable="false" style="pointer-events: none; display: block; width: 90px; height: 20px;">
          <g viewBox="0 0 90 20" preserveAspectRatio="none">

              <path d="M27.9704 3.12324C27.6411 1.89323 26.6745 0.926623 25.4445 0.597366C23.2173 2.24288e-07 14.2827 0 14.2827 0C14.2827 0 5.34807 2.24288e-07 3.12088 0.597366C1.89323 0.926623 0.924271 1.89323 0.595014 3.12324C-2.8036e-07 5.35042 0 10 0 10C0 10 -1.57361e-07 14.6496 0.597364 16.8768C0.926621 18.1068 1.89323 19.0734 3.12324 19.4026C5.35042 20 14.285 20 14.285 20C14.285 20 23.2197 20 25.4468 19.4026C26.6769 19.0734 27.6435 18.1068 27.9727 16.8768C28.5701 14.6496 28.5701 10 28.5701 10C28.5701 10 28.5677 5.35042 27.9704 3.12324Z" fill="#FF0000"></path>

        </svg>

    </div>
    <div class="header-center">

        <button class="search-btn" id="searchButton">

  <main class="main">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-section">
        <a class="sidebar-item active" data-page="home" data-tooltip="Home">
          <span class="material-symbols-rounded sidebar-icon">home</span>
          <span class="sidebar-label">Home</span>
        </a>
        <a class="sidebar-item" data-page="shorts" data-tooltip="Shorts">
          <span class="material-symbols-rounded sidebar-icon">play_circle</span>
          <span class="sidebar-label">Shorts</span>
        </a>
        <a class="sidebar-item" data-page="subscriptions" data-tooltip="Subscriptions">
          <span class="material-symbols-rounded sidebar-icon">subscriptions</span>
          <span class="sidebar-label">Subscriptions</span>
        </a>
      </nav>
      <hr class="sidebar-divider">
      <nav class="sidebar-section">
        <a class="sidebar-item" data-page="library" data-tooltip="Library">

  <div id="toast" class="toast">Notification</div>

  <script>
    const state = {
      currentTab: 'home',
      searchQuery: '',
      currentVideo: null,
      likedVideos: JSON.parse(localStorage.getItem('yt_liked')) || [],
      history: JSON.parse(localStorage.getItem('yt_history')) || [],
      subscriptions: ['TechDaily', 'Music Vevo', 'Gaming Hub', 'Daily Vlogs']
    };

    const els = {
      searchInput: document.getElementById("searchInput"),
      autocomplete: document.getElementById("autocomplete"),
      backdrop: document.getElementById("backdrop"),
      searchButton: document.getElementById("searchButton"),
      mainSection: document.getElementById("mainSection"),
      shortsSection: document.getElementById("shortsSection"),
      watchLayout: document.getElementById("watchLayout"),
      resultsGrid: document.getElementById("resultsGrid"),
      shortsGrid: document.getElementById("shortsGrid"),
      mainPlayer: document.getElementById("mainPlayer"),
      pageTitle: document.getElementById("pageTitle"),
      chips: document.querySelectorAll(".chip"),
      sidebarItems: document.querySelectorAll(".sidebar-item"),
      homeLogo: document.getElementById("homeLogo"),
      toast: document.getElementById("toast"),
      likeBtn: document.getElementById("likeBtn"),
      likeText: document.getElementById("likeText")
    };

    const API_BASE = "/api/search";

    function saveToHistory(video) {
      state.history = state.history.filter(v => v.id !== video.id);
      state.history.unshift(video);
      if(state.history.length > 50) state.history.pop();
      localStorage.setItem('yt_history', JSON.stringify(state.history));
    }

    function toggleLike(video) {
      const index = state.likedVideos.findIndex(v => v.id === video.id);
      if (index === -1) {
        state.likedVideos.unshift(video);
        showToast("Added to Liked videos");
      } else {
        state.likedVideos.splice(index, 1);
        showToast("Removed from Liked videos");
      }
      localStorage.setItem('yt_liked', JSON.stringify(state.likedVideos));
      updateLikeButtonState();
    }

    function isLiked(videoId) {
      return state.likedVideos.some(v => v.id === videoId);
    }

    function updateLikeButtonState() {
      if (!state.currentVideo) return;
      const liked = isLiked(state.currentVideo.id);
      if (liked) {
        els.likeBtn.classList.add("liked");
        els.likeText.textContent = "Liked";
      } else {
        els.likeBtn.classList.remove("liked");
        els.likeText.textContent = "Like";
      }
    }

    function showToast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add("show");
      setTimeout(() => els.toast.classList.remove("show"), 3000);
    }

    function switchTab(tabName, query = "") {
      state.currentTab = tabName;
      
      els.mainSection.classList.add("hidden");
      els.shortsSection.classList.add("hidden");
      els.watchLayout.classList.add("hidden");
      els.watchLayout.classList.remove("active");
      
      els.sidebarItems.forEach(item => {
        if (item.dataset.page === tabName) item.classList.add("active");
        else item.classList.remove("active");
      });

      if (tabName === 'home' && !query) {
        els.chips.forEach(c => c.classList.remove("active"));
        els.chips[0].classList.add("active");
      }

      if (tabName === 'shorts') {
        els.shortsSection.classList.remove("hidden");
        loadShorts();
      } else if (tabName === 'history') {
        els.mainSection.classList.remove("hidden");
        els.pageTitle.style.display = 'block';
        els.pageTitle.textContent = "Watch History";
        renderStorageGrid(state.history);
      } else if (tabName === 'liked') {
        els.mainSection.classList.remove("hidden");
        els.pageTitle.style.display = 'block';
        els.pageTitle.textContent = "Liked Videos";
        renderStorageGrid(state.likedVideos);
      } else if (tabName === 'library') {
        els.mainSection.classList.remove("hidden");
        els.pageTitle.style.display = 'block';
        els.pageTitle.textContent = "Library";
        const librarySet = new Set([...state.history, ...state.likedVideos].map(v => JSON.stringify(v)));
        const libraryList = Array.from(librarySet).map(s => JSON.parse(s));
        renderStorageGrid(libraryList);
      } else if (tabName === 'subscriptions') {
        els.mainSection.classList.remove("hidden");
        els.pageTitle.style.display = 'block';
        els.pageTitle.textContent = "Latest from Subscriptions";
        performSearch("Tech Review");
      } else {
        els.mainSection.classList.remove("hidden");
        els.pageTitle.style.display = 'none';
        performSearch(query);
      }
    }

    function renderGrid(videos) {
      els.resultsGrid.innerHTML = "";
      if (!videos || videos.length === 0) {
        els.resultsGrid.innerHTML = '<div class="empty-state"><span class="material-symbols-rounded">search_off</span><p>No videos found.</p></div>';
        return;
      }

      videos.forEach((video, index) => {
        const title = video.title || "Untitled Video";
        const channel = video.channel || "Unknown Channel";
        const views = video.views || "0 views";
        const duration = video.duration || "";
        const thumb = video.thumbnail || "";
        const id = video.id || index;

        const card = document.createElement("article");
        card.className = "video-card";
        card.innerHTML = `
          <div class="thumbnail">
            <img src="${thumb}" onerror="this.src='https://via.placeholder.com/320x180?text=Video'">
            ${duration ? `<div class="duration-badge">${duration}</div>` : ''}
          </div>
          <div class="video-info">
            <div class="video-avatar"></div>
            <div class="video-meta">
              <h3 class="video-title">${title}</h3>
              <p class="video-channel">${channel}</p>
              <p class="video-stats">${views} ${duration ? '• ' + duration : ''}</p>
            </div>
          </div>
        `;
        card.addEventListener("click", () => openWatch(video));
        els.resultsGrid.appendChild(card);
      });
    }

    function renderStorageGrid(videos) {
      renderGrid(videos);
    }

    function renderShorts(videos) {
      els.shortsGrid.innerHTML = "";
      if (!videos || videos.length === 0) {
        els.shortsGrid.innerHTML = '<div class="empty-state">No shorts found.</div>';
        return;
      }

      videos.forEach(video => {
        const card = document.createElement("article");
        card.className = "shorts-card";
        card.innerHTML = `
          <div class="thumbnail">
            <img src="${video.thumbnail}" onerror="this.src='https://via.placeholder.com/320x568?text=Shorts'">
          </div>
          <div class="video-meta">
            <h3 class="video-title">${video.title}</h3>
          </div>
        `;
        card.addEventListener("click", () => openWatch(video));
        els.shortsGrid.appendChild(card);
      });
    }

    function performSearch(query) {
      state.searchQuery = query;
      els.resultsGrid.innerHTML = '<div class="loader"></div>';
      els.mainEmpty.style.display = "none";

      const searchParam = query ? encodeURIComponent(query) : "";

      fetch(API_BASE + "?query=" + searchParam)
        .then(res => res.json())
        .then(data => {
          const videos = data.results || [];
          if(state.currentTab === 'shorts') {
            renderShorts(videos);
          } else {
            renderGrid(videos);
          }
        })
        .catch(err => {
          console.error(err);
          els.resultsGrid.innerHTML = '<div class="empty-state">Error loading results. Is the backend running?</div>';
        });
    }

    function loadShorts() {
      performSearch("shorts");
    }

    function openWatch(video) {
      state.currentVideo = video;
      
      saveToHistory(video);

      els.mainSection.classList.add("hidden");
      els.shortsSection.classList.add("hidden");
      els.watchLayout.classList.remove("hidden");
      els.watchLayout.classList.add("active");

      document.getElementById("watchTitle").textContent = video.title;
      document.getElementById("watchChannelName").textContent = video.channel || "Channel Name";
      document.getElementById("watchViews").textContent = video.views || "0 views";
      document.getElementById("watchDescription").textContent = `Description for: ${video.title}\n\nThis is a simulated description.`;
      
      setEmbedMode("youtube", video.id);

      updateLikeButtonState();

      loadRelated(state.searchQuery || "related");
      
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function loadRelated(query) {
      fetch(API_BASE + "?query=" + encodeURIComponent(query))
        .then(res => res.json())
        .then(data => {
          const videos = data.results || [];
          const container = document.getElementById("relatedList");
          container.innerHTML = "";
          
          videos.forEach(video => {
            if(video.id === state.currentVideo.id) return;

            const item = document.createElement("div");
            item.className = "related-item";
            item.innerHTML = `
              <div class="related-thumb">
                <img src="${video.thumbnail}" onerror="this.src='https://via.placeholder.com/168x94'">
              </div>
              <div class="related-info">
                <div class="related-title">${video.title}</div>
                <div class="related-channel">${video.channel}</div>
                <div class="related-stats">${video.views}</div>
              </div>
            `;
            item.addEventListener("click", () => openWatch(video));
            container.appendChild(item);
          });
        });
    }

    function setEmbedMode(mode, id) {
      const player = document.getElementById("mainPlayer");
      const btnYt = document.getElementById("embedYoutube");
      const btnTheta = document.getElementById("embedTheta");
      
      btnYt.classList.remove("active");
      btnTheta.classList.remove("active");

      if (mode === "youtube") {
        btnYt.classList.add("active");
        player.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;
      } else {
        btnTheta.classList.add("active");
        player.src = `https://thetacloud.org/yt/#${id}`;
      }
    }

    els.searchButton.addEventListener("click", () => {
      switchTab('search', els.searchInput.value);
    });
    els.searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") switchTab('search', els.searchInput.value);
    });

    els.chips.forEach(chip => {
      chip.addEventListener("click", () => {
        els.chips.forEach(c => c.classList.remove("active"));
        chip.classList.add("active");
        
        const query = chip.dataset.query;
        els.searchInput.value = query;
        switchTab('search', query);
      });
    });

    els.sidebarItems.forEach(item => {
      item.addEventListener("click", () => {
        const page = item.dataset.page;
        if (page) switchTab(page);
      });
    });

    els.homeLogo.addEventListener("click", () => switchTab('home'));

    els.likeBtn.addEventListener("click", () => {
      if (state.currentVideo) toggleLike(state.currentVideo);
    });

    document.getElementById("embedYoutube").addEventListener("click", () => {
      if (state.currentVideo) setEmbedMode("youtube", state.currentVideo.id);
    });
    document.getElementById("embedTheta").addEventListener("click", () => {
      if (state.currentVideo) setEmbedMode("thetacloud", state.currentVideo.id);
    });

    els.backdrop.addEventListener("click", () => {
      document.body.classList.remove("mobile-sidebar-open");
    });

    function updateAutocomplete() {
      const query = els.searchInput.value.trim();
      els.autocomplete.innerHTML = "";
      if (!query) { els.autocomplete.style.display = "none"; return; }

      fetch("https://api.datamuse.com/sug?s=" + encodeURIComponent(query))
        .then(res => res.json())
        .then(data => {
          data.forEach(item => {
            const div = document.createElement("div");
            div.className = "autocomplete-item";
            div.innerHTML = `<span class="material-symbols-rounded">search</span> ${item.word}`;
            div.addEventListener("click", () => {
              els.searchInput.value = item.word;
              els.autocomplete.style.display = "none";
              switchTab('search', item.word);
            });
            els.autocomplete.appendChild(div);
          });
          els.autocomplete.style.display = "block";
        });
    }
    els.searchInput.addEventListener("input", updateAutocomplete);
    document.addEventListener("click", (e) => {
      if (!els.autocomplete.contains(e.target) && e.target !== els.searchInput) {
        els.autocomplete.style.display = "none";
      }
    });

    window.addEventListener("load", () => {
      switchTab('home');
    });
  </script>
</body>
</html>
