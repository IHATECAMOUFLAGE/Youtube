<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YouTube</title>
<link rel="icon" href="https://www.google.com/s2/favicons?domain=https://youtube.com&sz=256" type="image/png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
<style>
:root {
  --bg-main: #0f0f0f;
  --bg-header: #0f0f0f;
  --bg-sidebar: #0f0f0f;
  --bg-card: #181818;
  --bg-chip: #272727;
  --bg-chip-active: #f1f1f1;
  --text-primary: #ffffff;
  --text-secondary: #aaaaaa;
  --border-subtle: #303030;
  --accent: #3ea6ff;
  --tooltip-bg: #282828;
  --brand-red: #ff0000;
}
*,
*::before,
*::after {
  box-sizing: border-box;
}
body {
  margin: 0;
  font-family: 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background-color: var(--bg-main);
  color: var(--text-primary);
  overflow-x: hidden;
}
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: 56px;
  background-color: var(--bg-header);
}
.header-left,
.header-center,
.header-right {
  display: flex;
  align-items: center;
}
.header-left {
  gap: 16px;
}
.header-center {
  flex: 0 1 640px;
  justify-content: center;
  gap: 8px;
}
.header-right {
  gap: 8px;
}
.brand {
  display: flex;
  align-items: center;
  cursor: pointer;
  text-decoration: none;
}
.brand-svg {
  height: 20px;
  width: auto;
}
.icon-btn,
.mic-btn {
  border: none;
  background: transparent;
  color: var(--text-primary);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.icon-btn:hover,
.mic-btn:hover {
  background-color: #272727;
}
.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #555;
  cursor: pointer;
}
.main {
  display: flex;
  min-height: calc(100vh - 56px);
}
.sidebar {
  position: sticky;
  top: 56px;
  align-self: flex-start;
  height: calc(100vh - 56px);
  background-color: var(--bg-sidebar);
  padding-top: 12px;
  padding-bottom: 12px;
  overflow-y: auto;
  border-right: 1px solid var(--border-subtle);
  transition: width 0.2s ease, transform 0.2s ease;
}
.sidebar-section {
  display: flex;
  flex-direction: column;
  padding: 0 12px;
}
.sidebar-divider {
  border: none;
  border-top: 1px solid var(--border-subtle);
  margin: 12px 0;
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 8px 12px;
  border-radius: 10px;
  color: var(--text-primary);
  text-decoration: none;
  font-size: 14px;
  cursor: pointer;
  position: relative;
}
.sidebar-item:hover {
  background-color: #272727;
}
.sidebar-item.active {
  background-color: #272727;
  font-weight: 500;
}
.sidebar-icon {
  font-size: 22px;
}
body.sidebar-full .sidebar {
  width: 240px;
}
body.sidebar-mini .sidebar {
  width: 72px;
}
body.sidebar-mini .sidebar-label {
  display: none;
}
body.sidebar-mini .sidebar-item {
  padding: 8px 0;
  justify-content: center;
  gap: 0;
}
body.sidebar-mini .sidebar-icon {
  margin: 0;
}
body.sidebar-mini .sidebar-item::after {
  content: attr(data-tooltip);
  position: fixed;
  left: 72px;
  background-color: var(--tooltip-bg);
  color: var(--text-primary);
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 12px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transform: translateX(-4px);
  transition: opacity 0.15s ease, transform 0.15s ease;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
  z-index: 200;
}
body.sidebar-mini .sidebar-item:hover::after {
  opacity: 1;
  transform: translateX(0);
}
.content {
  flex: 1;
  padding: 24px 24px 40px;
  width: 100%;
}
.chips-row {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.chips-row::-webkit-scrollbar {
  display: none;
}
.chip {
  border: none;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 14px;
  font-weight: 500;
  background-color: var(--bg-chip);
  color: var(--text-primary);
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s;
}
.chip:hover {
  background-color: #3f3f3f;
}
.chip.active {
  background-color: var(--bg-chip-active);
  color: #0f0f0f;
}
.section-header {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
  display: none;
}
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px 16px;
}
.video-card {
  cursor: pointer;
}
.thumbnail {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #333;
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  position: relative;
}
.thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s;
}
.video-card:hover .thumbnail img {
  transform: scale(1.05);
}
.duration-badge {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: rgba(0, 0, 0, 0.8);
  color: white;
  font-size: 12px;
  padding: 2px 4px;
  border-radius: 4px;
  font-weight: 500;
}
.video-info {
  display: flex;
  gap: 12px;
}
.video-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #333;
  flex-shrink: 0;
}
.video-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.video-title {
  font-size: 16px;
  font-weight: 500;
  margin: 0;
  line-height: 1.2rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.video-channel,
.video-stats {
  font-size: 14px;
  color: var(--text-secondary);
  margin: 0;
}
.shorts-grid {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  padding-bottom: 20px;
  scrollbar-width: none;
}
.shorts-grid::-webkit-scrollbar {
  display: none;
}
.shorts-card {
  min-width: 200px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.shorts-card .thumbnail {
  margin-bottom: 0;
  aspect-ratio: 9 / 16;
  border-radius: 16px;
}
.shorts-card .video-title {
  font-size: 14px;
  -webkit-line-clamp: 2;
}
.watch-layout {
  display: none;
  gap: 24px;
  max-width: 100%;
}
.watch-layout.active {
  display: grid;
  grid-template-columns: minmax(0, 2.5fr) minmax(0, 1fr);
  gap: 24px;
}
.watch-player {
  width: 100%;
}
.watch-player iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: none;
  border-radius: 12px;
  background: #000;
}
.watch-title {
  font-size: 20px;
  margin: 12px 0 8px;
  font-weight: 600;
}
.watch-meta-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  font-size: 14px;
  color: var(--text-secondary);
  border-bottom: 1px solid #303030;
  padding-bottom: 12px;
  margin-bottom: 12px;
}
.watch-channel {
  display: flex;
  align-items: center;
  gap: 12px;
}
.watch-channel-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: #333;
}
.watch-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.pill-btn {
  border-radius: 999px;
  border: none;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 500;
  background: #272727;
  color: var(--text-primary);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.pill-btn:hover {
  background: #3a3a3a;
}
.pill-btn.liked {
  background: #3ea6ff;
  color: #0f0f0f;
}
.embed-toggle {
  display: inline-flex;
  border-radius: 999px;
  overflow: hidden;
  border: 1px solid #3a3a3a;
}
.embed-toggle button {
  border: none;
  background: transparent;
  color: var(--text-secondary);
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
}
.embed-toggle button.active {
  background: #ffffff;
  color: #000000;
}
.watch-description {
  margin-top: 12px;
  padding: 12px;
  background: #202020;
  border-radius: 12px;
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.4;
}
.related-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.related-item {
  display: flex;
  gap: 8px;
  cursor: pointer;
}
.related-thumb {
  width: 168px;
  height: 94px;
  border-radius: 8px;
  overflow: hidden;
  background: #333;
  flex-shrink: 0;
  position: relative;
}
.related-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.related-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  font-size: 14px;
}
.related-title {
  color: var(--text-primary);
  font-weight: 500;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.related-channel,
.related-stats {
  color: var(--text-secondary);
  font-size: 12px;
}
.home-section {
  display: block;
}
.home-section.hidden {
  display: none;
}
.watch-layout.hidden {
  display: none;
}
.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--text-secondary);
}
.empty-state span {
  font-size: 48px;
  display: block;
  margin-bottom: 16px;
  opacity: 0.5;
}
.loader {
  border: 3px solid #333;
  border-top: 3px solid #fff;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 60px auto;
}
@keyframes spin {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}
.toast {
  position: fixed;
  bottom: 24px;
  left: 24px;
  background-color: #fff;
  color: #0f0f0f;
  padding: 12px 24px;
  border-radius: 4px;
  font-size: 14px;
  z-index: 2000;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s ease;
}
.toast.show {
  transform: translateY(0);
  opacity: 1;
}
.backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  z-index: 90;
}
body.mobile-sidebar-open .backdrop {
  opacity: 1;
  pointer-events: auto;
}
.search-wrapper {
  display: flex;
  align-items: stretch;
  flex: 1;
  max-width: 600px;
  position: relative;
}
.search-input {
  flex: 1;
  background-color: #121212;
  border: 1px solid #303030;
  border-right: none;
  border-radius: 999px 0 0 999px;
  padding: 8px 16px;
  color: var(--text-primary);
  font-size: 16px;
  position: relative;
  z-index: 10;
}
.search-input:focus {
  outline: none;
  border-color: #3ea6ff;
}
.search-btn {
  border-radius: 0 999px 999px 0;
  background-color: #222222;
  border: 1px solid #303030;
  border-left: none;
  width: 64px;
  cursor: pointer;
  color: var(--text-primary);
}
.search-btn:hover {
  background-color: #333;
}
.autocomplete {
  position: absolute;
  top: 40px;
  left: 0;
  right: 64px;
  background-color: #212121;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
  max-height: 360px;
  overflow-y: auto;
  display: none;
  padding: 4px 0;
  z-index: 20;
}
.autocomplete-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 14px;
}
.autocomplete-item:hover,
.autocomplete-item.active {
  background-color: #333333;
}
.menu-toggle-btn {
  border: none;
  background: transparent;
  color: var(--text-primary);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.menu-toggle-btn:hover {
  background-color: #272727;
}
@media (max-width: 1024px) {
  .watch-layout.active {
    grid-template-columns: 1fr;
  }
  .related-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px;
    margin-top: 24px;
  }
  .related-item {
    flex-direction: column;
  }
  .related-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    height: auto;
  }
}
@media (max-width: 960px) {
  .main {
    padding-top: 0;
  }
  .sidebar {
    position: fixed;
    top: 56px;
    left: 0;
    height: calc(100vh - 56px);
    transform: translateX(-100%);
    width: 240px;
    z-index: 100;
  }
  body.mobile-sidebar-open .sidebar {
    transform: translateX(0);
  }
  body.sidebar-full .sidebar,
  body.sidebar-mini .sidebar {
    width: 240px;
  }
  .content {
    padding: 16px;
  }
  .header-center {
    flex: 1;
    margin: 0 8px;
  }
  .search-wrapper {
    max-width: none;
  }
  .autocomplete {
    right: 0;
  }
}
@media (max-width: 600px) {
  .header-right {
    gap: 4px;
  }
  .video-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body class="sidebar-full">
<div class="backdrop" id="backdrop"></div>
<header class="header">
  <div class="header-left">
    <button class="menu-toggle-btn" id="menuToggle">
      <span class="material-symbols-rounded">menu</span>
    </button>
    <div class="brand" id="homeLogo">
      <svg class="brand-svg" viewBox="0 0 90 20" preserveAspectRatio="xMidYMid meet" focusable="false">
        <g>
          <rect x="0" y="0" width="24" height="20" rx="4" fill="#ff0000"></rect>
          <polygon points="10,6 16,10 10,14" fill="#ffffff"></polygon>
        </g>
        <text x="30" y="14" fill="#ffffff" font-size="11" font-family="Roboto, sans-serif">YouTube</text>
      </svg>
    </div>
  </div>
  <div class="header-center">
    <div class="search-wrapper">
      <input id="searchInput" type="text" placeholder="Search" class="search-input" autocomplete="off">
      <button class="search-btn" id="searchButton">
        <span class="material-symbols-rounded">search</span>
      </button>
      <div id="autocomplete" class="autocomplete"></div>
    </div>
    <button class="mic-btn">
      <span class="material-symbols-rounded">mic</span>
    </button>
  </div>
  <div class="header-right">
    <button class="icon-btn">
      <span class="material-symbols-rounded">video_call</span>
    </button>
    <button class="icon-btn">
      <span class="material-symbols-rounded">notifications</span>
    </button>
    <div class="avatar"></div>
  </div>
</header>
<main class="main">
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-section">
      <a class="sidebar-item active" data-page="home" data-tooltip="Home">
        <span class="material-symbols-rounded sidebar-icon">home</span>
        <span class="sidebar-label">Home</span>
      </a>
      <a class="sidebar-item" data-page="shorts" data-tooltip="Shorts">
        <span class="material-symbols-rounded sidebar-icon">play_circle</span>
        <span class="sidebar-label">Shorts</span>
      </a>
      <a class="sidebar-item" data-page="subscriptions" data-tooltip="Subscriptions">
        <span class="material-symbols-rounded sidebar-icon">subscriptions</span>
        <span class="sidebar-label">Subscriptions</span>
      </a>
    </nav>
    <hr class="sidebar-divider">
    <nav class="sidebar-section">
      <a class="sidebar-item" data-page="library" data-tooltip="Library">
        <span class="material-symbols-rounded sidebar-icon">video_library</span>
        <span class="sidebar-label">Library</span>
      </a>
      <a class="sidebar-item" data-page="history" data-tooltip="History">
        <span class="material-symbols-rounded sidebar-icon">history</span>
        <span class="sidebar-label">History</span>
      </a>
      <a class="sidebar-item" data-page="liked" data-tooltip="Liked videos">
        <span class="material-symbols-rounded sidebar-icon">thumb_up</span>
        <span class="sidebar-label">Liked videos</span>
      </a>
    </nav>
  </aside>
  <section class="content">
    <div class="chips-row" id="chipsRow">
      <button class="chip active" data-query="">All</button>
      <button class="chip" data-query="Music">Music</button>
      <button class="chip" data-query="Gaming">Gaming</button>
      <button class="chip" data-query="News">News</button>
      <button class="chip" data-query="Live">Live</button>
      <button class="chip" data-query="Vlogs">Vlogs</button>
      <button class="chip" data-query="Programming">Programming</button>
      <button class="chip" data-query="Cooking">Cooking</button>
    </div>
    <div id="mainSection" class="home-section">
      <h2 id="pageTitle" class="section-header">Recommended</h2>
      <div id="mainEmpty" class="empty-state" style="display:none;">
        <span class="material-symbols-rounded">search_off</span>
        <p>No videos found.</p>
      </div>
      <div id="resultsGrid" class="video-grid"></div>
    </div>
    <div id="shortsSection" class="home-section hidden">
      <h2 class="section-header" style="display:block;">Shorts</h2>
      <div id="shortsGrid" class="shorts-grid"></div>
    </div>
    <div id="watchLayout" class="watch-layout hidden">
      <div class="watch-left">
        <div class="watch-player">
          <iframe id="mainPlayer" src="" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>
        </div>
        <h1 id="watchTitle" class="watch-title"></h1>
        <div class="watch-meta-row">
          <div class="watch-channel">
            <div class="watch-channel-avatar"></div>
            <div>
              <div id="watchChannelName" style="font-weight:600; color:var(--text-primary);"></div>
              <div id="watchViews" style="font-size:12px;color:var(--text-secondary);"></div>
            </div>
          </div>
          <div class="watch-actions">
            <div class="embed-toggle">
              <button id="embedYoutube" class="active">YouTube</button>
              <button id="embedTheta">Ad-less</button>
            </div>
            <button id="likeBtn" class="pill-btn">
              <span class="material-symbols-rounded" style="font-size:18px;">thumb_up</span>
              <span id="likeText">Like</span>
            </button>
            <button class="pill-btn">
              <span class="material-symbols-rounded" style="font-size:18px;">share</span>
              <span>Share</span>
            </button>
          </div>
        </div>
        <div id="watchDescription" class="watch-description">Description goes here.</div>
      </div>
      <div class="watch-right">
        <div id="relatedList" class="related-list"></div>
      </div>
    </div>
  </section>
</main>
<div id="toast" class="toast">Notification</div>
<script>
var API_BASE = "/api/search";
var state = {
  currentTab: "home",
  searchQuery: "",
  currentVideo: null,
  likedVideos: JSON.parse(localStorage.getItem("yt_liked") || "[]"),
  history: JSON.parse(localStorage.getItem("yt_history") || "[]"),
  subscriptions: ["TechDaily", "Music Vevo", "Gaming Hub", "Daily Vlogs"]
};
var currentResults = [];
var currentVideoIndex = -1;
var embedMode = "youtube";
var selectedIndex = -1;
var els = {
  searchInput: document.getElementById("searchInput"),
  autocomplete: document.getElementById("autocomplete"),
  backdrop: document.getElementById("backdrop"),
  searchButton: document.getElementById("searchButton"),
  mainSection: document.getElementById("mainSection"),
  shortsSection: document.getElementById("shortsSection"),
  watchLayout: document.getElementById("watchLayout"),
  resultsGrid: document.getElementById("resultsGrid"),
  shortsGrid: document.getElementById("shortsGrid"),
  mainPlayer: document.getElementById("mainPlayer"),
  pageTitle: document.getElementById("pageTitle"),
  chips: document.querySelectorAll(".chip"),
  sidebarItems: document.querySelectorAll(".sidebar-item"),
  homeLogo: document.getElementById("homeLogo"),
  toast: document.getElementById("toast"),
  likeBtn: document.getElementById("likeBtn"),
  likeText: document.getElementById("likeText"),
  mainEmpty: document.getElementById("mainEmpty"),
  watchTitle: document.getElementById("watchTitle"),
  watchChannelName: document.getElementById("watchChannelName"),
  watchViews: document.getElementById("watchViews"),
  watchDescription: document.getElementById("watchDescription"),
  relatedList: document.getElementById("relatedList"),
  embedYoutube: document.getElementById("embedYoutube"),
  embedTheta: document.getElementById("embedTheta"),
  sidebar: document.getElementById("sidebar"),
  menuToggle: document.getElementById("menuToggle")
};
function isMobile() {
  return window.innerWidth <= 960;
}
function applyResponsiveSidebar() {
  var body = document.body;
  if (isMobile()) {
    body.classList.remove("sidebar-full");
    body.classList.remove("sidebar-mini");
    body.classList.remove("mobile-sidebar-open");
  } else {
    body.classList.remove("mobile-sidebar-open");
    if (window.innerWidth <= 1200) {
      body.classList.remove("sidebar-full");
      body.classList.add("sidebar-mini");
    } else {
      if (!body.classList.contains("sidebar-full") && !body.classList.contains("sidebar-mini")) {
        body.classList.add("sidebar-full");
      }
    }
  }
}
applyResponsiveSidebar();
window.addEventListener("resize", applyResponsiveSidebar);
els.menuToggle.addEventListener("click", function () {
  var body = document.body;
  if (isMobile()) {
    var isOpen = body.classList.toggle("mobile-sidebar-open");
    if (!isOpen) {
      body.classList.remove("mobile-sidebar-open");
    }
    return;
  }
  if (body.classList.contains("sidebar-full")) {
    body.classList.remove("sidebar-full");
    body.classList.add("sidebar-mini");
  } else if (body.classList.contains("sidebar-mini")) {
    body.classList.remove("sidebar-mini");
    body.classList.add("sidebar-full");
  } else {
    body.classList.add("sidebar-full");
  }
});
els.backdrop.addEventListener("click", function () {
  document.body.classList.remove("mobile-sidebar-open");
});
els.sidebar.addEventListener("click", function (e) {
  if (isMobile()) {
    var item = e.target.closest(".sidebar-item");
    if (item) {
      document.body.classList.remove("mobile-sidebar-open");
    }
  }
});
function fetchSuggestions(query) {
  var url = "https://api.datamuse.com/sug?s=" + encodeURIComponent(query);
  return fetch(url)
    .then(function (res) {
      return res.json();
    })
    .then(function (data) {
      return data.map(function (item) {
        return item.word;
      });
    })
    .catch(function () {
      return [];
    });
}
function updateAutocomplete() {
  var query = els.searchInput.value.trim();
  els.autocomplete.innerHTML = "";
  selectedIndex = -1;
  if (!query) {
    els.autocomplete.style.display = "none";
    return;
  }
  fetchSuggestions(query).then(function (suggestions) {
    if (!suggestions.length) {
      els.autocomplete.style.display = "none";
      return;
    }
    suggestions.forEach(function (text) {
      var item = document.createElement("div");
      item.className = "autocomplete-item";
      item.innerHTML = '<span class="material-symbols-rounded">search</span><span class="autocomplete-text">' + text + "</span>";
      item.addEventListener("click", function () {
        els.searchInput.value = text;
        els.autocomplete.style.display = "none";
        performSearch(text);
      });
      els.autocomplete.appendChild(item);
    });
    els.autocomplete.style.display = "block";
  });
}
els.searchInput.addEventListener("input", updateAutocomplete);
els.searchInput.addEventListener("keydown", function (e) {
  var items = els.autocomplete.querySelectorAll(".autocomplete-item");
  if (!items.length) return;
  if (e.key === "ArrowDown") {
    e.preventDefault();
    selectedIndex = (selectedIndex + 1) % items.length;
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    selectedIndex = (selectedIndex - 1 + items.length) % items.length;
  } else if (e.key === "Enter") {
    if (selectedIndex >= 0) {
      e.preventDefault();
      var textSpan = items[selectedIndex].querySelector(".autocomplete-text");
      var val = textSpan ? textSpan.textContent.trim() : items[selectedIndex].innerText.trim();
      els.searchInput.value = val;
      els.autocomplete.style.display = "none";
      performSearch(val);
    } else {
      performSearch(els.searchInput.value);
    }
    return;
  } else if (e.key === "Escape") {
    els.autocomplete.style.display = "none";
    return;
  } else {
    return;
  }

  searchInput.addEventListener('keydown', (e)  => {
    if (e.key === 'Enter') {
      autocomplete.style.display = 'none';
      performSearch(searchInput.value); 
    }
  });
  
  items.forEach(function (item) {
    item.classList.remove("active");
  });
  if (selectedIndex >= 0 && items[selectedIndex]) {
    items[selectedIndex].classList.add("active");
  }
});
document.addEventListener("click", function (e) {
  var clickedInside = els.autocomplete.contains(e.target) || els.searchInput.contains(e.target);
  if (!clickedInside) {
    els.autocomplete.style.display = "none";
  }
});
els.searchButton.addEventListener("click", function () {
  performSearch(els.searchInput.value);
});
els.homeLogo.addEventListener("click", function () {
  switchTab("home", "");
});
els.chips.forEach(function (chip) {
  chip.addEventListener("click", function () {
    els.chips.forEach(function (c) {
      c.classList.remove("active");
    });
    chip.classList.add("active");
    var q = chip.getAttribute("data-query") || "";
    switchTab("home", q);
  });
});
els.sidebarItems.forEach(function (item) {
  item.addEventListener("click", function () {
    var page = item.getAttribute("data-page");
    switchTab(page, "");
  });
});
function renderGrid(list) {
  els.resultsGrid.innerHTML = "";
  if (!list.length) {
    els.mainEmpty.style.display = "block";
    return;
  }
  els.mainEmpty.style.display = "none";
  list.forEach(function (video, index) {
    var card = document.createElement("article");
    card.className = "video-card";
    var thumbUrl = video.thumbnail || "";
    var title = video.title || "";
    var channel = video.channel || "";
    var views = video.views || "";
    var duration = video.duration || "";
    card.innerHTML =
      '<div class="thumbnail">' +
      '<img src="' +
      thumbUrl +
      '" onerror="this.src=\'https://via.placeholder.com/320x180\'">' +
      (duration ? '<div class="duration-badge">' + duration + "</div>" : "") +
      "</div>" +
      '<div class="video-info">' +
      '<div class="video-avatar"></div>' +
      '<div class="video-meta">' +
      '<h3 class="video-title">' +
      title +
      "</h3>" +
      '<p class="video-channel">' +
      channel +
      "</p>" +
      '<p class="video-stats">' +
      views +
      (duration ? " • " + duration : "") +
      "</p>" +
      "</div>" +
      "</div>";
    card.addEventListener("click", function () {
      openWatch(index);
    });
    els.resultsGrid.appendChild(card);
  });
}
function renderStorageGrid(videos) {
  els.resultsGrid.innerHTML = "";
  if (!videos.length) {
    els.mainEmpty.style.display = "block";
    return;
  }
  els.mainEmpty.style.display = "none";
  videos.forEach(function (video, index) {
    var card = document.createElement("article");
    card.className = "video-card";
    var thumbUrl = video.thumbnail || "";
    var title = video.title || "";
    var channel = video.channel || "";
    var views = video.views || "";
    var duration = video.duration || "";
    card.innerHTML =
      '<div class="thumbnail">' +
      '<img src="' +
      thumbUrl +
      '" onerror="this.src=\'https://via.placeholder.com/320x180\'">' +
      (duration ? '<div class="duration-badge">' + duration + "</div>" : "") +
      "</div>" +
      '<div class="video-info">' +
      '<div class="video-avatar"></div>' +
      '<div class="video-meta">' +
      '<h3 class="video-title">' +
      title +
      "</h3>" +
      '<p class="video-channel">' +
      channel +
      "</p>" +
      '<p class="video-stats">' +
      views +
      (duration ? " • " + duration : "") +
      "</p>" +
      "</div>" +
      "</div>";
    card.addEventListener("click", function () {
      currentResults = videos.slice();
      openWatch(index);
    });
    els.resultsGrid.appendChild(card);
  });
}
function performSearch(query) {
  if (!query) query = "";
  state.searchQuery = query;
  els.searchInput.value = query;
  els.mainEmpty.style.display = "none";
  els.resultsGrid.innerHTML = '<div class="loader"></div>';
  fetch(API_BASE + "?query=" + encodeURIComponent(query))
    .then(function (res) {
      return res.json();
    })
    .then(function (data) {
      currentResults = data.results || [];
      state.currentTab = "search";
      els.mainSection.classList.remove("hidden");
      els.shortsSection.classList.add("hidden");
      els.watchLayout.classList.add("hidden");
      els.watchLayout.classList.remove("active");
      els.pageTitle.style.display = "none";
      renderGrid(currentResults);
    })
    .catch(function () {
      els.resultsGrid.innerHTML =
        '<div class="empty-state"><span class="material-symbols-rounded">error</span><p>Error loading results.</p></div>';
    });
}
function openWatch(index) {
  if (!currentResults.length || !currentResults[index]) return;
  currentVideoIndex = index;
  var video = currentResults[index];
  var id = video.id;
  var title = video.title || "";
  var channel = video.channel || "YouTube";
  var views = video.views || "";
  state.currentVideo = video;
  saveToHistory(video);
  els.watchTitle.textContent = title;
  els.watchChannelName.textContent = channel;
  els.watchViews.textContent = views;
  els.watchDescription.textContent = "Playing: " + title + " • Channel: " + channel;
  setEmbedMode(embedMode, id);
  renderRelated(index);
  els.mainSection.classList.add("hidden");
  els.shortsSection.classList.add("hidden");
  els.watchLayout.classList.remove("hidden");
  els.watchLayout.classList.add("active");
  updateLikeButtonState();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function renderRelated(activeIndex) {
  els.relatedList.innerHTML = "";
  currentResults.forEach(function (video, index) {
    if (index === activeIndex) return;
    var item = document.createElement("div");
    item.className = "related-item";
    var thumbUrl = video.thumbnail || "";
    var title = video.title || "";
    var channel = video.channel || "";
    var views = video.views || "";
    var duration = video.duration || "";
    item.innerHTML =
      '<div class="related-thumb">' +
      '<img src="' +
      thumbUrl +
      '" onerror="this.src=\'https://via.placeholder.com/168x94\'">' +
      "</div>" +
      '<div class="related-info">' +
      '<div class="related-title">' +
      title +
      "</div>" +
      '<div class="related-channel">' +
      channel +
      "</div>" +
      '<div class="related-stats">' +
      views +
      (duration ? " • " + duration : "") +
      "</div>" +
      "</div>";
    item.addEventListener("click", function () {
      openWatch(index);
    });
    els.relatedList.appendChild(item);
  });
}
function setEmbedMode(mode, id) {
  embedMode = mode;
  els.embedYoutube.classList.remove("active");
  els.embedTheta.classList.remove("active");
  if (mode === "youtube") {
    els.embedYoutube.classList.add("active");
    els.mainPlayer.src = "https://www.youtube.com/embed/" + encodeURIComponent(id) + "?autoplay=1&rel=0&modestbranding=1";
  } else {
    els.embedTheta.classList.add("active");
    els.mainPlayer.src = "https://thetacloud.org/yt/#" + encodeURIComponent(id);
  }
}
els.embedYoutube.addEventListener("click", function () {
  if (currentVideoIndex < 0 || !currentResults[currentVideoIndex]) return;
  setEmbedMode("youtube", currentResults[currentVideoIndex].id);
});
els.embedTheta.addEventListener("click", function () {
  if (currentVideoIndex < 0 || !currentResults[currentVideoIndex]) return;
  setEmbedMode("thetacloud", currentResults[currentVideoIndex].id);
});
function saveToHistory(video) {
  state.history = state.history.filter(function (v) {
    return v.id !== video.id;
  });
  state.history.unshift(video);
  if (state.history.length > 50) state.history.pop();
  localStorage.setItem("yt_history", JSON.stringify(state.history));
}
function toggleLike(video) {
  var index = state.likedVideos.findIndex(function (v) {
    return v.id === video.id;
  });
  if (index === -1) {
    state.likedVideos.unshift(video);
    showToast("Added to Liked videos");
  } else {
    state.likedVideos.splice(index, 1);
    showToast("Removed from Liked videos");
  }
  localStorage.setItem("yt_liked", JSON.stringify(state.likedVideos));
  updateLikeButtonState();
}
function isLiked(videoId) {
  return state.likedVideos.some(function (v) {
    return v.id === videoId;
  });
}
function updateLikeButtonState() {
  if (!state.currentVideo) return;
  var liked = isLiked(state.currentVideo.id);
  if (liked) {
    els.likeBtn.classList.add("liked");
    els.likeText.textContent = "Liked";
  } else {
    els.likeBtn.classList.remove("liked");
    els.likeText.textContent = "Like";
  }
}
els.likeBtn.addEventListener("click", function () {
  if (!state.currentVideo) return;
  toggleLike(state.currentVideo);
});
function showToast(msg) {
  els.toast.textContent = msg;
  els.toast.classList.add("show");
  setTimeout(function () {
    els.toast.classList.remove("show");
  }, 3000);
}
function loadShorts() {
  els.shortsGrid.innerHTML = "";
  var sample = currentResults.slice(0, 10);
  if (!sample.length) {
    els.shortsGrid.innerHTML =
      '<div class="empty-state"><span class="material-symbols-rounded">movie</span><p>No shorts available.</p></div>';
    return;
  }
  sample.forEach(function (video, index) {
    var card = document.createElement("div");
    card.className = "shorts-card";
    var thumbUrl = video.thumbnail || "";
    var title = video.title || "";
    card.innerHTML =
      '<div class="thumbnail">' +
      '<img src="' +
      thumbUrl +
      '" onerror="this.src=\'https://via.placeholder.com/200x356\'">' +
      "</div>" +
      '<h3 class="video-title">' +
      title +
      "</h3>";
    card.addEventListener("click", function () {
      openWatch(index);
    });
    els.shortsGrid.appendChild(card);
  });
}
function switchTab(tabName, query) {
  state.currentTab = tabName;
  els.mainSection.classList.add("hidden");
  els.shortsSection.classList.add("hidden");
  els.watchLayout.classList.add("hidden");
  els.watchLayout.classList.remove("active");
  els.sidebarItems.forEach(function (item) {
    if (item.dataset.page === tabName) item.classList.add("active");
    else item.classList.remove("active");
  });
  if (tabName === "home" && !query) {
    els.chips.forEach(function (c) {
      c.classList.remove("active");
    });
    els.chips[0].classList.add("active");
  }
  if (tabName === "shorts") {
    els.shortsSection.classList.remove("hidden");
    loadShorts();
  } else if (tabName === "history") {
    els.mainSection.classList.remove("hidden");
    els.pageTitle.style.display = "block";
    els.pageTitle.textContent = "Watch History";
    renderStorageGrid(state.history);
  } else if (tabName === "liked") {
    els.mainSection.classList.remove("hidden");
    els.pageTitle.style.display = "block";
    els.pageTitle.textContent = "Liked Videos";
    renderStorageGrid(state.likedVideos);
  } else if (tabName === "library") {
    els.mainSection.classList.remove("hidden");
    els.pageTitle.style.display = "block";
    els.pageTitle.textContent = "Library";
    var librarySet = new Set(
      []
        .concat(state.history, state.likedVideos)
        .map(function (v) {
          return JSON.stringify(v);
        })
    );
    var libraryList = Array.from(librarySet).map(function (s) {
      return JSON.parse(s);
    });
    renderStorageGrid(libraryList);
  } else if (tabName === "subscriptions") {
    els.mainSection.classList.remove("hidden");
    els.pageTitle.style.display = "block";
    els.pageTitle.textContent = "Latest from Subscriptions";
    performSearch("Tech Review");
  } else {
    els.mainSection.classList.remove("hidden");
    els.pageTitle.style.display = "none";
    performSearch(query);
  }
}
  
var presets = ["Music", "Gaming", "News", "Live", "Vlogs", "Programming", "Cooking"];
var randomQuery = presets[Math.floor(Math.random() * presets.length)];
switchTab("home", randomQuery);
</script>
